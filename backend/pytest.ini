[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    unit: white-box unit tests on individual service functions
    bva: boundary value analysis tests at thresholds and edges
    equivalence: equivalence partitioning tests across valid/invalid input classes
    integration: integration tests across services, routes, and layers
    security: authentication, authorisation, and input-safety tests
    performance: latency and throughput tests with explicit budgets
    regression: golden-output regression tests pinning stable behaviour
    smoke: end-to-end happy-path smoke test used as a build gate